name: Auto Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    name: Create release tag
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Read and verify versions across all packages
        id: version
        run: |
          VERSION=$(python3 - << 'PY'
          import json, re, pathlib, sys, xml.etree.ElementTree as ET

          errors = []

          # Python
          text = pathlib.Path('python/pyproject.toml').read_text()
          m = re.search(r'version\s*=\s*\"([^\"]+)\"', text)
          py = m.group(1) if m else None
          if not py:
              errors.append('Could not find version in python/pyproject.toml')

          # C#
          tree = ET.parse('csharp/src/MeasFlow/MeasFlow.csproj')
          node = tree.find('.//Version')
          cs = node.text.strip() if node is not None else None
          if not cs:
              errors.append('Could not find Version in csharp/src/MeasFlow/MeasFlow.csproj')

          # C (vcpkg.json)
          with open('c/vcpkg.json') as f:
              c_ver = json.load(f).get('version-string')
          if not c_ver:
              errors.append('Could not find version-string in c/vcpkg.json')

          # C port (port/vcpkg.json)
          with open('c/port/vcpkg.json') as f:
              port_ver = json.load(f).get('version')
          if not port_ver:
              errors.append('Could not find version in c/port/vcpkg.json')

          if errors:
              for e in errors:
                  print(f'::error::{e}', file=sys.stderr)
              sys.exit(1)

          versions = {'python/pyproject.toml': py, 'csharp/src/MeasFlow/MeasFlow.csproj': cs,
                      'c/vcpkg.json': c_ver, 'c/port/vcpkg.json': port_ver}
          unique = set(versions.values())
          if len(unique) != 1:
              print('::error::Version mismatch across packages:', file=sys.stderr)
              for f, v in versions.items():
                  print(f'  {f}: {v}', file=sys.stderr)
              sys.exit(1)

          print(py)
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Check if release already exists
        id: release
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Trigger release workflow
        if: steps.release.outputs.exists == 'false'
        run: gh workflow run release.yml --ref "v${{ steps.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ github.token }}
