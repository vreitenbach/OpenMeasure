name: Benchmarks

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR
concurrency:
  group: benchmarks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # ── Setup ────────────────────────────────────────────────────────────
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -e ".[dev]" h5py
        working-directory: python

      - name: Install C vcpkg deps (with HDF5)
        run: vcpkg install lz4 zstd hdf5

      - name: Build C library + benchmarks (with HDF5)
        run: |
          cmake -B build -S c -DMEAS_BUILD_BENCHMARKS=ON \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_MANIFEST_FEATURES="benchmarks" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      # ── Run ALL C# benchmarks at once ──────────────────────────────────
      - name: C# benchmarks (all suites)
        run: |
          dotnet run --project csharp/benchmarks/MeasFlow.Benchmarks/MeasFlow.Benchmarks.csproj \
            -c Release -- --exporters GitHub
          # BenchmarkDotNet writes artifacts relative to CWD (repo root)
          ARTS=BenchmarkDotNet.Artifacts/results
          ls -la "$ARTS"/ 2>/dev/null || echo "No artifacts at $ARTS, trying alt path..."
          # Fallback: check under the project directory
          [ ! -d "$ARTS" ] && ARTS=csharp/benchmarks/MeasFlow.Benchmarks/BenchmarkDotNet.Artifacts/results
          cp "$ARTS"/*CrossLanguage*-report-github.md csharp_xlang.md 2>/dev/null || true
          cp "$ARTS"/*FormatComparison*-report-github.md csharp_fmtcmp.md 2>/dev/null || true
          cp "$ARTS"/*WriteBenchmarks*-report-github.md csharp_write.md 2>/dev/null || true
          cp "$ARTS"/*ReadBenchmarks*-report-github.md csharp_read.md 2>/dev/null || true
          cp "$ARTS"/*FileSizeBenchmarks*-report-github.md csharp_filesize.md 2>/dev/null || true
          echo "Copied artifacts:" && ls -la csharp_*.md 2>/dev/null || echo "No .md files copied"
        continue-on-error: true

      # ── Python benchmarks ──────────────────────────────────────────────
      - name: Python cross-language benchmark
        run: python benchmarks/cross_language.py > ../python_xlang.txt 2>&1
        working-directory: python
        continue-on-error: true

      - name: Python format comparison benchmark
        run: python benchmarks/format_comparison.py > ../python_fmtcmp.txt 2>&1
        working-directory: python
        continue-on-error: true

      # ── C benchmarks ───────────────────────────────────────────────────
      - name: C cross-language benchmark
        run: ./build/bench_cross_language > c_xlang.txt 2>&1
        continue-on-error: true

      - name: C format comparison benchmark
        run: ./build/bench_format_comparison > c_fmtcmp.txt 2>&1
        continue-on-error: true

      # ── Build report ───────────────────────────────────────────────────
      - name: Build benchmark report
        run: python .github/scripts/build_bench_report.py

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: bench_report.md

      - name: Comment on PR
        # Silently skip for fork PRs (read-only GITHUB_TOKEN)
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: benchmarks
          path: bench_report.md
